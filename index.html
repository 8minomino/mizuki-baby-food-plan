<body>
<main><div id="baby-food-weekly-plan-2026" class="meal-plan">
  <style>
    #baby-food-weekly-plan-2026 {
      --meal-yellow: #facc15;
      --meal-yellow-soft: #fff8d8;
      --meal-amber: #f59e0b;
      --meal-amber-soft: #fff2d6;
      --meal-orange: #f97316;
      --meal-orange-soft: #fff3e8;
      --meal-gray-900: #30333a;
      --meal-gray-700: #616873;
      --meal-gray-500: #969da8;
      --meal-gray-300: #d9dde4;
      --meal-gray-100: #f7f7fa;
      --meal-gray-50: #fffefe;
      color: var(--meal-gray-900);
      font-size: var(--font-size-base);
      background: var(--meal-gray-50);
    }

    #baby-food-weekly-plan-2026 * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    #baby-food-weekly-plan-2026.meal-plan {
      width: 100%;
      display: grid;
      gap: 0.75rem;
      overflow: hidden;
    }

    #baby-food-weekly-plan-2026 .section-label,
    #baby-food-weekly-plan-2026 .day-label,
    #baby-food-weekly-plan-2026 .meta-label {
      color: var(--meal-gray-700);
    }

    #baby-food-weekly-plan-2026 .week-range,
    #baby-food-weekly-plan-2026 .day-date,
    #baby-food-weekly-plan-2026 .app-title,
    #baby-food-weekly-plan-2026 .phase-title,
    #baby-food-weekly-plan-2026 .flow-title {
      font-weight: 500;
    }

    #baby-food-weekly-plan-2026 .app-title {
      margin: 0;
      padding: 0.1rem 0.12rem 0.2rem;
      font: inherit;
      font-weight: 500;
    }

    #baby-food-weekly-plan-2026 .control-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      align-items: center;
      justify-content: space-between;
      padding-block: 0.15rem;
    }

    #baby-food-weekly-plan-2026 .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      align-items: center;
    }

    #baby-food-weekly-plan-2026 button {
      appearance: none;
      display: inline-flex;
      gap: 0.28rem;
      align-items: center;
      justify-content: center;
      min-width: 0;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0.48rem 0.72rem;
      color: var(--meal-gray-900);
      background: var(--meal-yellow);
      cursor: pointer;
      font: inherit;
    }

    #baby-food-weekly-plan-2026 button[data-active="true"],
    #baby-food-weekly-plan-2026 button.primary-action {
      border-color: transparent;
      color: var(--meal-gray-50);
      background: var(--meal-orange);
    }

    #baby-food-weekly-plan-2026 button:disabled {
      cursor: default;
      opacity: 0.5;
    }

    #baby-food-weekly-plan-2026 button:focus-visible {
      outline: 2px solid var(--meal-orange);
      outline-offset: 2px;
    }

    #baby-food-weekly-plan-2026 .week-shell,
    #baby-food-weekly-plan-2026 .overview-shell {
      display: grid;
      gap: 0.8rem;
    }

    #baby-food-weekly-plan-2026 [hidden] {
      display: none !important;
    }

    #baby-food-weekly-plan-2026 .week-summary {
      display: grid;
      gap: 0.55rem;
      padding: 0.68rem 0.72rem;
      border: 1px solid var(--meal-gray-300);
      border-radius: 8px;
      background: var(--meal-gray-50);
    }

    #baby-food-weekly-plan-2026 .week-top {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: start;
      justify-content: space-between;
    }

    #baby-food-weekly-plan-2026 .week-copy {
      display: grid;
      gap: 0.25rem;
      min-width: min(100%, 15rem);
    }

    #baby-food-weekly-plan-2026 .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    #baby-food-weekly-plan-2026 .badge {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--meal-gray-300);
      border-radius: 999px;
      padding: 0.16rem 0.45rem;
      color: var(--meal-gray-900);
      background: var(--meal-gray-100);
      white-space: nowrap;
    }

    #baby-food-weekly-plan-2026 .badge.gray {
      border-color: var(--meal-gray-300);
      background: var(--meal-gray-100);
    }

    #baby-food-weekly-plan-2026 .badge.yellow {
      border-color: color-mix(in srgb, var(--meal-yellow) 45%, var(--meal-gray-300));
      background: var(--meal-yellow-soft);
    }

    #baby-food-weekly-plan-2026 .badge.amber {
      border-color: color-mix(in srgb, var(--meal-amber) 45%, var(--meal-gray-300));
      background: var(--meal-amber-soft);
    }

    #baby-food-weekly-plan-2026 .badge.orange {
      border-color: color-mix(in srgb, var(--meal-orange) 45%, var(--meal-gray-300));
      background: var(--meal-orange-soft);
    }

    #baby-food-weekly-plan-2026 .day-list {
      display: grid;
      border-top: 1px solid var(--meal-gray-300);
    }

    #baby-food-weekly-plan-2026 .day-item {
      border-inline-start: 3px solid var(--meal-gray-300);
      border-bottom: 1px solid var(--meal-gray-300);
      border-radius: 8px;
      padding-inline: 0.42rem;
      background: var(--meal-gray-50);
    }

    #baby-food-weekly-plan-2026 .day-item + .day-item {
      margin-top: 0.16rem;
    }

    #baby-food-weekly-plan-2026 .day-summary {
      display: grid;
      grid-template-columns: minmax(4.6rem, 0.46fr) minmax(0, 1fr) auto auto;
      gap: 0.5rem;
      align-items: center;
      min-height: 2.55rem;
      padding: 0.4rem 0;
      cursor: pointer;
      list-style: none;
    }

    #baby-food-weekly-plan-2026 .day-summary::-webkit-details-marker {
      display: none;
    }

    #baby-food-weekly-plan-2026 .day-summary::after {
      content: "+";
      color: var(--meal-gray-700);
    }

    #baby-food-weekly-plan-2026 .day-item[open] .day-summary::after {
      content: "-";
    }

    #baby-food-weekly-plan-2026 .day-item[data-kind="travel"] {
      border-inline-start: 3px solid var(--meal-gray-500);
    }

    #baby-food-weekly-plan-2026 .day-item[data-kind="prep"] {
      border-inline-start: 3px solid var(--meal-amber);
    }

    #baby-food-weekly-plan-2026 .day-item[data-kind="new"] {
      border-inline-start: 3px solid var(--meal-orange);
    }

    #baby-food-weekly-plan-2026 .day-item[data-kind="two"] {
      border-inline-start: 3px solid var(--meal-yellow);
    }

    #baby-food-weekly-plan-2026 .summary-meal {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    #baby-food-weekly-plan-2026 .day-date {
      display: inline-flex;
      gap: 0.2rem;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-width: 4.15rem;
      border: 1px solid var(--meal-gray-300);
      border-radius: 999px;
      padding: 0.14rem 0.36rem;
      background: var(--meal-gray-100);
    }

    #baby-food-weekly-plan-2026 .day-detail {
      display: grid;
      gap: 0.34rem;
      padding: 0.2rem 0 0.7rem;
    }

    #baby-food-weekly-plan-2026 .detail-row {
      display: grid;
      grid-template-columns: minmax(2.7rem, 0.2fr) minmax(0, 1fr);
      gap: 0.45rem;
      min-width: 0;
    }

    #baby-food-weekly-plan-2026 .day-date,
    #baby-food-weekly-plan-2026 .meal-text,
    #baby-food-weekly-plan-2026 .memo-text,
    #baby-food-weekly-plan-2026 .phase-copy,
    #baby-food-weekly-plan-2026 .flow-copy,
    #baby-food-weekly-plan-2026 .fact-value {
      overflow-wrap: anywhere;
    }

    #baby-food-weekly-plan-2026 .empty {
      color: var(--meal-gray-700);
    }

    #baby-food-weekly-plan-2026 .week-note {
      display: grid;
      gap: 0.35rem;
      padding: 0.6rem 0.42rem;
      border-bottom: 1px solid var(--meal-gray-300);
    }

    #baby-food-weekly-plan-2026 .overview-grid {
      display: grid;
      gap: 0.6rem;
    }

    #baby-food-weekly-plan-2026 .phase-row {
      display: grid;
      grid-template-columns: minmax(5.8rem, 0.58fr) minmax(0, 1.4fr);
      gap: 0.8rem;
      padding: 0.76rem 0;
      border-top: 1px solid var(--meal-gray-300);
    }

    #baby-food-weekly-plan-2026 .phase-row:last-child {
      border-bottom: 1px solid var(--meal-gray-300);
    }

    #baby-food-weekly-plan-2026 .phase-marker {
      display: flex;
      gap: 0.45rem;
      align-items: start;
    }

    #baby-food-weekly-plan-2026 .phase-dot {
      flex: 0 0 auto;
      width: 0.72rem;
      aspect-ratio: 1;
      border-radius: 999px;
      margin-top: 0.32rem;
      border: 1px solid var(--meal-gray-300);
      background: var(--meal-orange);
    }

    #baby-food-weekly-plan-2026 .phase-row:nth-child(2) .phase-dot {
      background: var(--meal-amber);
    }

    #baby-food-weekly-plan-2026 .phase-row:nth-child(3) .phase-dot {
      background: var(--meal-yellow);
    }

    #baby-food-weekly-plan-2026 .phase-row:nth-child(4) .phase-dot {
      background: var(--meal-orange);
    }

    #baby-food-weekly-plan-2026 .phase-row:nth-child(5) .phase-dot {
      background: var(--meal-amber);
    }

    #baby-food-weekly-plan-2026 .phase-row:nth-child(6) .phase-dot {
      background: var(--meal-gray-500);
    }

    #baby-food-weekly-plan-2026 .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 660px) {
      #baby-food-weekly-plan-2026 .day-summary,
      #baby-food-weekly-plan-2026 .phase-row {

        {

          range: "11/2(月)-11/8(日)",

          focus: "2回食が自然に回ることを優先。次の3回食は12/2以降に検討。",
          tags: ["2回食", "8か月"],
          note: "鉄を意識しつつ、体調・便・睡眠が崩れる日は予定を戻します。",
          days: [
            ["11/2", "月", "7倍がゆ50g目安 + 野菜20g + たんぱく質10g前後。", "7倍がゆ30g + 野菜10-15g + たんぱく質5g。", "8か月。量よりリズム安定。", "two"],
            ["11/3", "火", "7倍がゆ + 慣れた野菜 + 豆腐または魚。", "7倍がゆ + 慣れた野菜。", "祝日想定。新食材なし。", "two"],
            ["11/4", "水", "7倍がゆ + 原材料が確認しやすい鉄強化ベビーフード少量。", "米がゆ + 野菜 + 豆腐。", "新食材扱い。初めての原材料が複数入る商品は避け、月齢表示を確認。", "new"],
            ["11/5", "木", "うどんまたはパンがゆ + 野菜 + たんぱく質。", "7倍がゆ + 野菜。", "主食の選択肢を増やす。", "two"],
            ["11/6", "金", "7倍がゆ + 卵黄または魚 + 野菜。", "7倍がゆ + 慣れた野菜 + 豆腐。", "卵は焦らず、体調の良い日に。", "two"],
            ["11/7", "土", "7倍がゆ + 慣れた組み合わせ。", "7倍がゆ + 慣れた組み合わせ。", "新食材なし。", "two"],
            ["11/8", "日", "7倍がゆ + 慣れた組み合わせ。", "7倍がゆ + 慣れた組み合わせ。", "次週以降も2回食継続。3回食は12/2頃から準備チェック。", "prep"]
          ]
        }
      ];

      const flow = [
      ["7/27-8/2", "準備", "器具・姿勢・初回ストック。開始サインを確認して8/3へ。"],
      ["8/3-8/30", "ひとさじ開始", "10倍がゆから野菜、豆腐、しらす、白身魚へ。"],
      ["8/31-9/13", "旅行前は安定", "6か月に入るが卵は旅行後へ。旅先で使う味に寄せる。"],
      ["9/14-9/22", "北海道旅行", "1回食キープ。米がゆ個包装と慣れた野菜フレークだけ。"],
      ["9/23-9/27", "帰宅後調整", "帰宅後の体調と生活リズムを戻し、2回食の冷凍準備。"],
      ["9/28-11/8", "2回食へ", "9/28から2回食。10/1朝に卵黄開始、7倍がゆへ移行。"]
      ];

      const weekBounds = [
        ["2026-07-27", "2026-08-02"],
        ["2026-08-03", "2026-08-09"],
        ["2026-08-10", "2026-08-16"],
        ["2026-08-17", "2026-08-23"],
        ["2026-08-24", "2026-08-30"],
        ["2026-08-31", "2026-09-06"],
        ["2026-09-07", "2026-09-13"],
        ["2026-09-14", "2026-09-20"],
        ["2026-09-21", "2026-09-27"],
        ["2026-09-28", "2026-10-04"],
        ["2026-10-05", "2026-10-11"],
        ["2026-10-12", "2026-10-18"],
        ["2026-10-19", "2026-10-25"],
        ["2026-10-26", "2026-11-01"],
        ["2026-11-02", "2026-11-08"]
      ];

      const dateToTime = (value) => {
        const [year, month, day] = value.split("-").map(Number);
        return new Date(year, month - 1, day).getTime();
      };

      const storedWeek = () => {
        try {
          const value = window.localStorage.getItem("baby-food-week-index");
          const index = Number(value);
          return Number.isInteger(index) && index >= 0 && index < weeks.length ? index : null;
        } catch {
          return null;
        }
      };

      const weekForToday = () => {
        const today = new Date();
        const todayTime = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
        const match = weekBounds.findIndex(([start, end]) => todayTime >= dateToTime(start) && todayTime <= dateToTime(end));
        if (match >= 0) return match;
        const next = weekBounds.findIndex(([start]) => todayTime < dateToTime(start));
        return next >= 0 ? next : weeks.length - 1;
      };

      const saveWeek = () => {
        try {
          window.localStorage.setItem("baby-food-week-index", String(currentWeek));
        } catch {
        }
      };

      let currentWeek = storedWeek() ?? weekForToday();
      let mode = "week";

      const escapeHtml = (value) => String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

      const kindLabel = (kind) => {
        if (kind === "travel") return ["ー", "gray"];
        if (kind === "prep") return ["作り置き", "amber"];
        if (kind === "new") return ["新食材", "orange"];
        if (kind === "two") return ["2回食", "yellow"];
        return ["", ""];
      };

      const tagTone = (index) => ["orange", "amber", "yellow", "gray"][index % 4];

      const renderDay = (day) => {
        const [date, dow, morning, evening, memo, kind] = day;
        const [label, tone] = kindLabel(kind);
        return `
          <details class="day-item" data-kind="${escapeHtml(kind)}">
            <summary class="day-summary">
              <span class="day-date">${escapeHtml(date)} <span class="meta-label">${escapeHtml(dow)}</span></span>
              <span class="summary-meal">${escapeHtml(morning)}</span>
              ${label ? `<span class="badge ${tone}">${escapeHtml(label)}</span>` : `<span></span>`}
            </summary>
            <div class="day-detail">
              <div class="detail-row">
                <span class="day-label">朝</span>
                <span class="meal-text">${escapeHtml(morning)}</span>
              </div>
              <div class="detail-row">
                <span class="day-label">夕</span>
                <span class="meal-text ${evening === "なし" ? "empty" : ""}">${escapeHtml(evening)}</span>
              </div>
              <div class="detail-row">
                <span class="day-label">メモ</span>
                <span class="memo-text">${escapeHtml(memo)}</span>
              </div>
            </div>
          </details>
        `;
      };

      const renderWeek = () => {
        const week = weeks[currentWeek];
        weekShell.innerHTML = `
          <section class="week-summary" aria-label="選択中の週">
            <div class="week-top">
              <div class="week-copy">
                <div class="section-label">${escapeHtml(week.code)}</div>
                <div class="week-range">${escapeHtml(week.range)}</div>
                <div>${escapeHtml(week.theme)}</div>
              </div>
              <div class="badge-row">
                <span class="badge">${escapeHtml(week.age)}</span>
                ${week.tags.map((tag, index) => `<span class="badge ${tagTone(index)}">${escapeHtml(tag)}</span>`).join("")}
              </div>
            </div>
            <div>${escapeHtml(week.focus)}</div>
          </section>
          <section class="day-list" aria-label="1週間分の表">
            ${week.days.map(renderDay).join("")}
          </section>
          <section class="week-note" aria-label="週のメモ">
          <div class="section-label">週メモ</div>
            <div>${escapeHtml(week.note)}</div>
          </section>
        `;
      };

      const renderOverview = () => {
        overviewShell.innerHTML = `
          <section class="overview-grid" aria-label="大まかな流れ">
            ${flow.map((item) => `
              <div class="phase-row">
                <div class="phase-marker">
                  <span class="phase-dot" aria-hidden="true"></span>
                  <div>
                    <div class="meta-label">${escapeHtml(item[0])}</div>
                    <div class="phase-title">${escapeHtml(item[1])}</div>
                  </div>
                </div>
                <div class="phase-copy">${escapeHtml(item[2])}</div>
              </div>
            `).join("")}
          </section>
        `;
      };

      const syncControls = () => {
        root.querySelectorAll("button[data-action]").forEach((button) => {
          const action = button.dataset.action;
          if (action === "week" || action === "overview") {
            button.dataset.active = String(action === mode);
            button.setAttribute("aria-pressed", String(action === mode));
          }
        });
        weekNav.hidden = mode !== "week";
        const prev = root.querySelector('button[data-action="prev"]');
        const next = root.querySelector('button[data-action="next"]');
        prev.disabled = currentWeek === 0;
        next.disabled = currentWeek === weeks.length - 1;
      };

      const render = () => {
        const showWeek = mode === "week";
        weekShell.hidden = !showWeek;
        overviewShell.hidden = showWeek;
        if (showWeek) renderWeek();
        else renderOverview();
        syncControls();
        if (window.lucide && typeof window.lucide.createIcons === "function") {
          window.lucide.createIcons({ attrs: { width: 16, height: 16 } });
        }
      };

      root.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const action = button.dataset.action;
        if (action === "week" || action === "overview") {
          mode = action;
        }
        if (action === "prev") {
          currentWeek = Math.max(0, currentWeek - 1);
          saveWeek();
        }
        if (action === "next") {
          currentWeek = Math.min(weeks.length - 1, currentWeek + 1);
          saveWeek();
        }
        render();
      });

      render();
    })();
  </script>
